<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
</head>
<body>
    <fieldset>
        <h1>Contact Us</h1>
        <label for="fname" >First Name:</label>
        <input type="text" placeholder="Enter your first name" id="fname" name="fname" required><br><br>
        <label for="lname" >Last Name:</label>
        <input type="text" placeholder="Enter your last name" id="lname" name="lname" required><br><br>
        <label for="email" >Email:</label>
        <input type="email" placeholder="Enter your email" id="email" name="email" required><br><br>
        <label for="pnumber" >Phone Number:</label>
        <input type="tel" placeholder="+91" id="pnumber" name="pnumber" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" title="Format: +91-123-456-7890" maxlength="13" required><br><br>
        <label for="subject" >Subject:</label>
        <input type="text" placeholder="Enter the subject" id="subject" name="subject" required><br><br>
        <copyright>copyright &copy; </copyright>

    </fieldset>
</body>
</html>
